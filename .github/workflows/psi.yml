name: PageSpeed Insights Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual runs from the Actions tab
  workflow_dispatch:
    inputs:
      site_base:
        description: "Base URL to audit (overrides default)"
        required: false
        default: "https://softreetechnology.com"

jobs:
  psi-audit:
    name: PSI Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run PageSpeed Insights checks
        env:
          PSI_API_KEY: ${{ secrets.PSI_API_KEY }}
          PSI_SITE_BASE: ${{ inputs.site_base || 'https://softreetechnology.com' }}
        run: node scripts/psi-check.mjs
